<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Body Metrics" />
<title>Body Metrics</title>
<style>
  :root {
    --bg: #0F1117;
    --surface: #181C27;
    --card: #1E2333;
    --border: #2A3050;
    --accent: #4FFFB0;
    --accent-dim: #1A4035;
    --text: #E8EDF5;
    --muted: #6B7594;
    --danger: #FF4F6A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; padding-bottom: 40px; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 20px; display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  .pulse { width: 9px; height: 9px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 12px var(--accent); flex-shrink: 0; }
  .brand { font-weight: 700; font-size: 15px; letter-spacing: 0.08em; }
  .tabs { margin-left: auto; display: flex; gap: 6px; }
  .tab { background: none; color: var(--muted); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 13px; font-size: 12px; cursor: pointer; font-family: inherit; }
  .tab.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  .icon-btn { background: none; color: var(--muted); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 11px; font-size: 12px; cursor: pointer; font-family: inherit; }

  main { max-width: 720px; margin: 0 auto; padding: 20px 14px;
    display: flex; flex-direction: column; gap: 20px; }

  .add-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent);
    border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: inherit; width: 100%;
  }
  .add-btn .plus { font-size: 19px; line-height: 1; }

  .review { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .review h3 { font-size: 14px; margin-bottom: 4px; }
  .review .hint { font-size: 11px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
  .field-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--muted); }
  .field .inwrap { display: flex; align-items: center; background: var(--card);
    border: 1px solid var(--border); border-radius: 8px; padding: 0 10px; }
  .field input { background: none; border: none; color: var(--text); font-size: 16px;
    padding: 10px 0; width: 100%; font-family: inherit; font-variant-numeric: tabular-nums; }
  .field input:focus { outline: none; }
  .field .unit { color: var(--muted); font-size: 12px; padding-left: 4px; }
  .dt-field { grid-column: 1 / -1; }
  .actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn-primary { background: var(--accent); color: #0F1117; border: none; border-radius: 9px;
    padding: 11px 22px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; }
  .btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); border-radius: 9px;
    padding: 11px 18px; font-size: 14px; cursor: pointer; font-family: inherit; }

  .section-label { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

  .stats { display: flex; flex-wrap: wrap; gap: 9px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 11px; padding: 12px 15px; min-width: 96px; }
  .stat .l { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
  .stat .v { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat .v small { font-size: 11px; font-weight: 400; color: var(--muted); margin-left: 2px; }
  .stat .v.empty { color: var(--border); }
  .delta { font-size: 11px; margin-top: 3px; font-variant-numeric: tabular-nums; }
  .delta.up { color: #FF8C9D; }
  .delta.down { color: var(--accent); }
  .delta.flat { color: var(--muted); }

  .charts { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .chart { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 10px 8px; }
  .chart .ct { font-size: 12px; color: var(--muted); padding-left: 6px; margin-bottom: 6px; }
  .chart svg { display: block; width: 100%; height: 110px; overflow: visible; }

  .htable { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; min-width: 560px; }
  th, td { padding: 10px 12px; text-align: right; font-size: 12px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  th { color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
  th:first-child, td:first-child { text-align: left; }
  tbody td { border-bottom: 1px solid var(--border); }
  tbody tr:last-child td { border-bottom: none; }
  td.empty { color: var(--border); }
  .del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 0 2px; }

  .empty-state { text-align: center; color: var(--muted); padding: 38px 0; font-size: 13px; line-height: 1.6; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--card); border: 1px solid var(--accent); color: var(--text);
    padding: 11px 20px; border-radius: 10px; font-size: 13px; opacity: 0;
    transition: all .3s; z-index: 50; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<header>
  <div class="pulse"></div>
  <span class="brand">BODY METRICS</span>
  <div class="tabs">
    <button class="tab active" data-tab="dashboard">ダッシュボード</button>
    <button class="tab" data-tab="history">記録一覧</button>
    <button class="icon-btn" id="restoreBtn">↺ サンプル</button>
    <button class="icon-btn" id="csvBtn" style="display:none">↓ CSV</button>
  </div>
</header>

<main>
  <button class="add-btn" id="addBtn"><span class="plus">＋</span>新しい記録を追加</button>
  <div id="formWrap"></div>

  <section id="dashboard">
    <div id="latestWrap"></div>
    <div id="chartsWrap"></div>
  </section>

  <section id="history" style="display:none"></section>
</main>

<div class="toast" id="toast"></div>

<script>
const METRICS = [
  { key: "weight",      label: "体重",     unit: "kg",   color: "#4FFFB0", lowerBetter: true  },
  { key: "bodyFat",     label: "体脂肪率", unit: "%",    color: "#FF6B9D", lowerBetter: true  },
  { key: "muscle",      label: "筋肉量",   unit: "kg",   color: "#4FC3FF", lowerBetter: false },
  { key: "bmi",         label: "BMI",      unit: "",     color: "#FFB84F", lowerBetter: true  },
  { key: "basalMetab",  label: "基礎代謝", unit: "kcal", color: "#B84FFF", lowerBetter: false },
  { key: "boneMass",    label: "骨量",     unit: "kg",   color: "#4FF0FF", lowerBetter: false },
  { key: "visceralFat", label: "内臓脂肪", unit: "",     color: "#FF8C4F", lowerBetter: true  },
];
const STORE_KEY = "bodyMetricsRecords";
const REMOVED_KEY = "bodyMetricsRemovedSeeds";

// Two readings transcribed from TANITA DC-320 receipts, backfilled by id
// when missing so they show up even if an earlier version saved a blank state.
const SEED = [
  { id: 1749459540000, timestamp: "2026-06-09T18:19:00",
    weight: 67.0, bodyFat: 20.9, muscle: 50.2, bmi: 24.6, basalMetab: 1471, boneMass: 2.8, visceralFat: 10 },
  { id: 1750064580000, timestamp: "2026-06-16T12:53:00",
    weight: 67.9, bodyFat: 20.5, muscle: 51.2, bmi: 24.9, basalMetab: 1499, boneMass: 2.8, visceralFat: 10 },
];

let records = load();
let currentTab = "dashboard";

function getRemovedSeeds() {
  try { return JSON.parse(localStorage.getItem(REMOVED_KEY)) || []; } catch { return []; }
}
function load() {
  let saved = [];
  try { saved = JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { saved = []; }
  const removed = getRemovedSeeds();
  const haveIds = new Set(saved.map(r => r.id));
  let changed = false;
  for (const s of SEED) {
    if (!haveIds.has(s.id) && !removed.includes(s.id)) { saved.push({ ...s }); changed = true; }
  }
  saved.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
  if (changed) localStorage.setItem(STORE_KEY, JSON.stringify(saved));
  return saved;
}
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(records)); }

// ── Entry form ───────────────────────────────────────────────────
function openForm() {
  const now = new Date();
  const localDT = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
  const last = records[records.length - 1] || {};
  const fields = METRICS.map(m => `
    <div class="field">
      <label>${m.label}</label>
      <div class="inwrap">
        <input type="number" inputmode="decimal" step="any" data-key="${m.key}"
               value="${last[m.key] != null ? last[m.key] : ""}" placeholder="—" />
        ${m.unit ? `<span class="unit">${m.unit}</span>` : ""}
      </div>
    </div>`).join("");

  document.getElementById("formWrap").innerHTML = `
    <div class="review">
      <h3>新しい記録</h3>
      <div class="hint">レシートを見ながら入力してください。前回の値が入っているので、変わった数字だけ直せばOKです。空欄は記録されません。</div>
      <div class="field-grid">
        ${fields}
        <div class="field dt-field">
          <label>日時</label>
          <div class="inwrap"><input type="datetime-local" id="dtInput" value="${localDT}" /></div>
        </div>
      </div>
      <div class="actions">
        <button class="btn-primary" id="saveBtn">保存する</button>
        <button class="btn-ghost" id="cancelBtn">キャンセル</button>
      </div>
    </div>`;
  document.getElementById("addBtn").style.display = "none";
  document.getElementById("saveBtn").onclick = saveForm;
  document.getElementById("cancelBtn").onclick = closeForm;
  document.getElementById("formWrap").scrollIntoView({ behavior: "smooth", block: "start" });
}

function closeForm() {
  document.getElementById("formWrap").innerHTML = "";
  document.getElementById("addBtn").style.display = "";
}

function saveForm() {
  const rec = { id: Date.now() };
  document.querySelectorAll("#formWrap input[data-key]").forEach(inp => {
    const v = inp.value.trim();
    rec[inp.dataset.key] = v === "" ? null : Number(v);
  });
  const dt = document.getElementById("dtInput").value;
  rec.timestamp = dt ? new Date(dt).toISOString() : new Date().toISOString();
  if (!METRICS.some(m => rec[m.key] != null)) { toast("最低1つは数値を入力してください"); return; }
  records.push(rec);
  records.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
  save(); closeForm(); render(); toast("保存しました");
}

// ── Render ───────────────────────────────────────────────────────
function fmtDateTime(iso) {
  const d = new Date(iso);
  return d.toLocaleString("ja-JP", { month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit" });
}

function render() {
  document.getElementById("csvBtn").style.display = records.length ? "" : "none";
  renderDashboard();
  renderHistory();
}

function renderDashboard() {
  const latest = records[records.length - 1];
  const prev = records[records.length - 2];
  const lw = document.getElementById("latestWrap");
  if (!latest) {
    lw.innerHTML = `<div class="empty-state">「＋ 新しい記録を追加」から<br>最初のデータを入力してください</div>`;
  } else {
    lw.innerHTML = `<div class="section-label">最新の記録 · ${fmtDateTime(latest.timestamp)}</div>
      <div class="stats">${METRICS.map(m => {
        const v = latest[m.key];
        let delta = "";
        if (v != null && prev && prev[m.key] != null) {
          const d = +(v - prev[m.key]).toFixed(1);
          const cls = d === 0 ? "flat" : ((d < 0) === m.lowerBetter ? "down" : "up");
          const sign = d > 0 ? "+" : "";
          delta = `<div class="delta ${cls}">${sign}${d}${m.unit}</div>`;
        }
        return `<div class="stat">
          <div class="l">${m.label}</div>
          <div class="v ${v==null?"empty":""}" ${v!=null?`style="color:${m.color}"`:""}>
            ${v != null ? v : "—"}${v != null && m.unit ? `<small>${m.unit}</small>` : ""}
          </div>${delta}</div>`;
      }).join("")}</div>`;
  }

  const cw = document.getElementById("chartsWrap");
  if (records.length > 1) {
    cw.innerHTML = `<div class="section-label" style="margin-top:20px">推移グラフ</div>
      <div class="charts">${METRICS.map(m => sparkline(m)).filter(Boolean).join("")}</div>`;
  } else {
    cw.innerHTML = "";
  }
}

function sparkline(m) {
  const pts = records.filter(r => r[m.key] != null).map(r => ({ v: r[m.key] }));
  if (pts.length < 2) return "";
  const W = 240, H = 90, pad = 8;
  const vals = pts.map(p => p.v);
  let min = Math.min(...vals), max = Math.max(...vals);
  if (min === max) { min -= 1; max += 1; }
  const x = i => pad + (i / (pts.length - 1)) * (W - pad * 2);
  const y = v => H - pad - ((v - min) / (max - min)) * (H - pad * 2);
  const d = pts.map((p, i) => `${i ? "L" : "M"}${x(i).toFixed(1)},${y(p.v).toFixed(1)}`).join(" ");
  const dots = pts.map((p, i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="2.5" fill="${m.color}"/>`).join("");
  const last = pts[pts.length - 1].v;
  return `<div class="chart">
    <div class="ct">${m.label}${m.unit ? ` (${m.unit})` : ""} · <span style="color:${m.color}">${last}</span></div>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <path d="${d}" fill="none" stroke="${m.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
    </svg></div>`;
}

function renderHistory() {
  const h = document.getElementById("history");
  if (!records.length) { h.innerHTML = `<div class="empty-state">まだ記録がありません</div>`; return; }
  const head = `<tr><th>日時</th>${METRICS.map(m => `<th>${m.label}</th>`).join("")}<th></th></tr>`;
  const rows = [...records].reverse().map(r => `<tr>
    <td>${fmtDateTime(r.timestamp)}</td>
    ${METRICS.map(m => r[m.key] != null ? `<td>${r[m.key]}${m.unit}</td>` : `<td class="empty">—</td>`).join("")}
    <td><button class="del" data-id="${r.id}">✕</button></td>
  </tr>`).join("");
  h.innerHTML = `<div class="htable"><table><thead>${head}</thead><tbody>${rows}</tbody></table></div>`;
  h.querySelectorAll(".del").forEach(b => {
    b.onclick = () => {
      const delId = Number(b.dataset.id);
      records = records.filter(r => r.id !== delId);
      if (SEED.some(s => s.id === delId)) {
        const removed = getRemovedSeeds();
        if (!removed.includes(delId)) { removed.push(delId); localStorage.setItem(REMOVED_KEY, JSON.stringify(removed)); }
      }
      save(); render(); toast("削除しました");
    };
  });
}

function downloadCSV() {
  const headers = ["日時", ...METRICS.map(m => `${m.label}(${m.unit})`)];
  const rows = records.map(r => [r.timestamp, ...METRICS.map(m => r[m.key] ?? "")].join(","));
  const csv = "\uFEFF" + [headers.join(","), ...rows].join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "body-metrics.csv"; a.click();
  URL.revokeObjectURL(url);
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

document.getElementById("addBtn").onclick = openForm;
document.getElementById("csvBtn").onclick = downloadCSV;
document.getElementById("restoreBtn").onclick = () => {
  const haveIds = new Set(records.map(r => r.id));
  let added = 0;
  for (const s of SEED) {
    if (!haveIds.has(s.id)) { records.push({ ...s }); added++; }
  }
  records.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
  // clear any "removed seeds" memory so the restore always works
  localStorage.removeItem(REMOVED_KEY);
  save(); render();
  toast(added ? `${added}件のサンプルを復元しました` : "サンプルは既に入っています");
};
document.querySelectorAll(".tab").forEach(t => {
  t.onclick = () => {
    currentTab = t.dataset.tab;
    document.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x === t));
    document.getElementById("dashboard").style.display = currentTab === "dashboard" ? "" : "none";
    document.getElementById("history").style.display = currentTab === "history" ? "" : "none";
  };
});

render();
</script>
</body>
</html>
